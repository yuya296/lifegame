<!DOCTYPE html>
<html lang="ja">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no" />
  <title>Lifegame</title>
</head>
<body>
  <header>
    <h1>Lifegame</h1>
    <div id="status">
      <span>Gen: <span id="generation">0</span></span>
      <span>Alive: <span id="alive">0</span></span>
      <span><span id="grid-size">0×0</span></span>
    </div>
  </header>

  <main>
    <canvas id="board"></canvas>
  </main>

  <section id="controls">
    <div class="control-row">
      <button id="play" type="button">▶ Play</button>
      <button id="step-back" type="button">⟲ Back</button>
      <button id="step" type="button">Step ⟳</button>
      <label>
        Speed
        <input id="fps" type="range" min="1" max="60" step="1" value="10" />
        <span id="fps-display">10</span> Hz
      </label>
    </div>

    <div class="control-row">
      <label>
        Width
        <input id="width" type="number" min="1" max="500" value="60" />
      </label>
      <label>
        Height
        <input id="height" type="number" min="1" max="500" value="40" />
      </label>
      <button id="resize" type="button">Resize</button>
      <label>
        <input id="toroidal" type="checkbox" checked />
        Toroidal
      </label>
    </div>

    <div class="control-row">
      <button id="clear" type="button">Clear</button>
      <button id="randomize" type="button">Randomize</button>
      <label>
        Density
        <input id="density" type="range" min="0" max="1" step="0.05" value="0.3" />
        <span id="density-display">0.30</span>
      </label>
    </div>

    <div class="control-row">
      <label>
        Pattern
        <select id="pattern">
          <option value="">(none — click to toggle)</option>
        </select>
      </label>
      <span id="pattern-help">Move to preview, click to place. Esc to cancel.</span>
    </div>
  </section>
  <script type="module" src="/src/main.ts"></script>
</body>
</html>
